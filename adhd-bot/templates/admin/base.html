<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %} - ADHD Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <span class="text-xl font-bold text-gray-900">ADHD Bot Admin</span>
                    <a href="/admin" class="text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Dashboard</a>
                    <a href="/admin/users" class="text-gray-600 hover:text-gray-900 px-3 py-2 text-sm font-medium">Users</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">{{ email }}</span>
                    <span class="text-xs px-2 py-1 rounded-full {% if role == 'admin' %}bg-green-100 text-green-800{% else %}bg-gray-100 text-gray-600{% endif %}">{{ role }}</span>
                    <a href="/admin/logout" class="text-sm text-red-600 hover:text-red-800">Wyloguj</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
